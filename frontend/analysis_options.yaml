include: package:flutter_lints/flutter.yaml

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - avoid_unnecessary_containers
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields
    - require_trailing_commas
    - sort_pub_dependencies
    - use_key_in_widget_constructors

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "integration_test/**"
    - "test_direction.dart"
    - "test_direction_enum.dart"
    - "lib/core/navigation/app_router_simple.dart"
    - "lib/screens/enhanced_auth_screen.dart"
    - "lib/screens/**"
    - "lib/services/biometric_service.dart"
    - "lib/core/navigation/**"
    - "lib/features/auth/screens/**"
    - "lib/features/customer/screens/**"
    - "lib/features/delivery/screens/**"
    - "lib/features/driver/screens/**"
    - "lib/features/motor_taxi/screens/**"
  errors:
    invalid_annotation_target: ignore
