name: ubertaxi_frontend
description: Enhanced Flutter frontend for UberMoto delivery platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Internationalization
  easy_localization: ^3.0.7
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.8.0
  
  # State Management
  flutter_riverpod: ^3.2.0
  riverpod_annotation: ^4.0.0

  # Security & Authentication
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.0
  encrypt: ^5.0.0
  http_certificate_pinning: ^3.0.0

  # Modern UI & Design (RTL-Aware)
  material_color_utilities: ^0.11.0
  google_fonts: ^6.0.0
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  vibration: ^2.0.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.0

  # Enhanced UX
  flutter_adaptive_scaffold: ^2.0.0
  flutter_otp: ^2.0.0

  # Maps & Location (Platform-specific)
  flutter_map: ^8.2.0
  geolocator: ^14.0.0
  latlong2: ^0.9.1
  # MapLibre for Android only (conditional)
  maplibre_gl: ^0.25.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.9.0
  connectivity_plus: ^6.0.0
  go_router: ^14.6.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utilities
  intl: ^0.20.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  package_info_plus: ^8.1.0
  device_info_plus: ^11.1.0

  # WebSocket
  socket_io_client: ^3.1.4

  # Firebase Integration
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.1.0

  # Error Tracking
  sentry_flutter: ^9.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^4.0.0
  json_serializable: ^6.12.0
  riverpod_lint: ^3.1.3

dependency_overrides:
  # Use latest compatible versions
  maplibre_gl: ^0.25.0
  maplibre_gl_platform_interface: ^0.25.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
