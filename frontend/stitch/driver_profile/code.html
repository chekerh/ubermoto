<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Driver Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#f47b25',
              'primary-dark': '#d96a1e',
              'primary-light': '#fef3eb',
              'surface-light': '#ffffff',
              'surface-dark': '#1a1a2e',
              'background-light': '#faf9f7',
              'background-dark': '#0f0f1a',
              'text-main': '#1c130d',
              'text-secondary': '#8c7569',
              danger: '#ef4444',
            },
            fontFamily: { display: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>
      body { min-height: max(884px, 100dvh); font-family: 'Inter', sans-serif; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background-light font-display text-text-main antialiased min-h-screen flex flex-col overflow-hidden">

<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/95 backdrop-blur-md border-b border-primary/10 px-4 pt-12 pb-4 flex items-center justify-between">
  <button id="profile-back-btn" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 transition-colors">
    <span class="material-symbols-outlined text-2xl">arrow_back</span>
  </button>
  <h1 class="text-lg font-bold">My Profile</h1>
  <button id="profile-edit-btn" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 transition-colors">
    <span class="material-symbols-outlined text-2xl">edit</span>
  </button>
</header>

<!-- Main Content -->
<main class="flex-1 overflow-y-auto hide-scrollbar pb-24">

  <!-- Profile Card -->
  <div class="px-4 mt-6">
    <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm flex flex-col items-center">
      <div class="relative">
        <div id="profile-avatar" class="w-24 h-24 rounded-full bg-primary/10 border-4 border-white shadow-lg overflow-hidden">
          <img alt="Driver Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDReEpdEb1XDBF2Hh0fmGzEr0lSjzpzhaUrFAE9WesWkIzL9xIeBcRmF5XID6K1VcUaxuBdzIMiqxZn1zA48azqnrThh3qVwu3ctsGNMl-sTyNlFJLy1LpufISu8Lh0WqhghFTERguAKkUXvQmkp-FfrHGhimjZXbGdaz-ECEPdrTq2fyOfolE0SwABuwqil7M27VMm5PdASRKMzYM073SOeXGv98JRiPZv6AtCwzFwzf200ccjfN3iTEGhmnlxrmx-QRhwNauuEP0"/>
        </div>
        <button id="profile-camera-btn" class="absolute bottom-0 right-0 bg-primary text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md border-2 border-white">
          <span class="material-symbols-outlined text-lg">camera_alt</span>
        </button>
      </div>
      <h2 id="profile-name" class="text-xl font-bold mt-4">Mohamed Ben Ali</h2>
      <p id="profile-email" class="text-sm text-text-secondary mt-1">mohamed@nassib.tn</p>
      <div class="flex items-center gap-3 mt-3">
        <div class="flex items-center gap-1 bg-yellow-50 px-3 py-1 rounded-full">
          <span class="material-symbols-outlined text-yellow-500 text-lg" style="font-variation-settings: 'FILL' 1;">star</span>
          <span id="profile-rating" class="text-sm font-bold text-yellow-700">4.9</span>
        </div>
        <div class="flex items-center gap-1 bg-green-50 px-3 py-1 rounded-full">
          <span class="material-symbols-outlined text-green-600 text-sm">check_circle</span>
          <span id="profile-status" class="text-sm font-semibold text-green-700">Verified</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="grid grid-cols-3 gap-3 px-4 mt-5">
    <div class="bg-white rounded-xl p-3 border border-gray-100 shadow-sm text-center">
      <p id="profile-total-trips" class="text-lg font-bold">342</p>
      <p class="text-[11px] text-text-secondary">Total Trips</p>
    </div>
    <div class="bg-white rounded-xl p-3 border border-gray-100 shadow-sm text-center">
      <p id="profile-months" class="text-lg font-bold">6</p>
      <p class="text-[11px] text-text-secondary">Months Active</p>
    </div>
    <div class="bg-white rounded-xl p-3 border border-gray-100 shadow-sm text-center">
      <p id="profile-total-earned" class="text-lg font-bold">4,230</p>
      <p class="text-[11px] text-text-secondary">TND Earned</p>
    </div>
  </div>

  <!-- Vehicle Info -->
  <div class="px-4 mt-6">
    <h3 class="text-sm font-bold text-text-secondary uppercase tracking-wider mb-3">Vehicle</h3>
    <button id="profile-vehicle-btn" class="w-full flex items-center gap-4 bg-white rounded-xl p-4 border border-gray-100 shadow-sm hover:bg-gray-50 transition-colors">
      <div class="w-12 h-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-2xl">two_wheeler</span>
      </div>
      <div class="flex-1 text-left">
        <p id="profile-vehicle-name" class="font-semibold">Peugeot 103</p>
        <p id="profile-vehicle-plate" class="text-sm text-text-secondary">TU-1234-19 • Classic Edition</p>
      </div>
      <span class="material-symbols-outlined text-text-secondary">chevron_right</span>
    </button>
  </div>

  <!-- Settings Menu -->
  <div class="px-4 mt-6">
    <h3 class="text-sm font-bold text-text-secondary uppercase tracking-wider mb-3">Settings</h3>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden divide-y divide-gray-100">

      <button id="profile-documents-btn" class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 transition-colors">
        <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-xl">description</span>
        </div>
        <div class="flex-1 text-left">
          <p class="font-medium text-sm">Documents & Verification</p>
          <p class="text-xs text-text-secondary">CIN, License, Insurance</p>
        </div>
        <span class="material-symbols-outlined text-text-secondary text-xl">chevron_right</span>
      </button>

      <button id="profile-training-btn" class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 transition-colors">
        <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-xl">school</span>
        </div>
        <div class="flex-1 text-left">
          <p class="font-medium text-sm">Training Hub</p>
          <p class="text-xs text-text-secondary">3 of 8 modules completed</p>
        </div>
        <span class="material-symbols-outlined text-text-secondary text-xl">chevron_right</span>
      </button>

      <button id="profile-language-btn" class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 transition-colors">
        <div class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-xl">translate</span>
        </div>
        <div class="flex-1 text-left">
          <p class="font-medium text-sm">Language</p>
          <p class="text-xs text-text-secondary">English</p>
        </div>
        <span class="material-symbols-outlined text-text-secondary text-xl">chevron_right</span>
      </button>

      <button id="profile-help-btn" class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 transition-colors">
        <div class="w-10 h-10 rounded-full bg-orange-50 text-primary flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-xl">help</span>
        </div>
        <div class="flex-1 text-left">
          <p class="font-medium text-sm">Help & Support</p>
          <p class="text-xs text-text-secondary">FAQ, Contact us</p>
        </div>
        <span class="material-symbols-outlined text-text-secondary text-xl">chevron_right</span>
      </button>

      <button id="profile-about-btn" class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 transition-colors">
        <div class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-xl">info</span>
        </div>
        <div class="flex-1 text-left">
          <p class="font-medium text-sm">About Nassib</p>
          <p class="text-xs text-text-secondary">v1.0.2</p>
        </div>
        <span class="material-symbols-outlined text-text-secondary text-xl">chevron_right</span>
      </button>

    </div>
  </div>

  <!-- Logout -->
  <div class="px-4 mt-6 mb-8">
    <button id="profile-logout-btn" class="w-full flex items-center justify-center gap-2 py-3.5 rounded-xl border-2 border-danger text-danger font-bold hover:bg-red-50 transition-colors">
      <span class="material-symbols-outlined text-xl">logout</span>
      Log Out
    </button>
  </div>

</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 pb-6 pt-3 px-6 z-20">
  <div class="flex justify-between items-center">
    <a id="profile-nav-home" class="flex flex-col items-center gap-1 text-text-secondary hover:text-primary transition-colors" href="#">
      <span class="material-symbols-outlined text-[24px]">dashboard</span>
      <span class="text-[10px] font-medium">Dashboard</span>
    </a>
    <a id="profile-nav-wallet" class="flex flex-col items-center gap-1 text-text-secondary hover:text-primary transition-colors" href="#">
      <span class="material-symbols-outlined text-[24px]">account_balance_wallet</span>
      <span class="text-[10px] font-medium">Earnings</span>
    </a>
    <a id="profile-nav-docs" class="flex flex-col items-center gap-1 text-text-secondary hover:text-primary transition-colors" href="#">
      <span class="material-symbols-outlined text-[24px]">description</span>
      <span class="text-[10px] font-medium">Docs</span>
    </a>
    <a id="profile-nav-profile" class="flex flex-col items-center gap-1 text-primary" href="#">
      <div class="bg-primary/10 px-4 py-1 rounded-full">
        <span class="material-symbols-outlined text-[24px]">person</span>
      </div>
      <span class="text-[10px] font-bold">Profile</span>
    </a>
  </div>
</nav>

</body>
</html>
