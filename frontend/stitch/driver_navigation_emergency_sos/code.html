<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>UberMoto Driver Navigation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-dark": "#192633",
                        "text-secondary": "#92adc9",
                        "danger": "#ef4444", 
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom map pattern for the background */
        .map-bg {
            background-color: #101922;
            background-image: 
                linear-gradient(#192633 2px, transparent 2px),
                linear-gradient(90deg, #192633 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .road-path {
            position: absolute;
            top: 0;
            left: 50%;
            width: 12px;
            height: 100%;
            background: #2b8cee;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(43, 140, 238, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 overflow-hidden h-screen flex flex-col">
<!-- Top Bar -->
<header class="flex items-center bg-surface-dark p-4 pb-3 justify-between border-b border-[#233648] z-20 shadow-md">
<button class="text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center font-display">UberMoto Ride</h2>
<div class="flex items-center justify-end">
<button class="bg-danger hover:bg-red-600 text-white px-3 py-1.5 rounded-full text-sm font-bold shadow-lg shadow-red-500/20 flex items-center gap-1 transition-colors">
<span class="material-symbols-outlined text-lg">sos</span>
<span>SOS</span>
</button>
</div>
</header>
<!-- Main Content (Map Area) -->
<main class="relative flex-1 w-full overflow-hidden flex flex-col">
<!-- Map Background Simulation -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="Dark map view of city streets at night" data-location="Tunis, Tunisia" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuACs3FtaAW2oOWyks_VuZ4w3nHQ9gxqz17DXh68nUkt2ZpkOEopqhbGlEVwesAePvte1r9Nt6BOTjeZub-RJpmvWru-JwWNblq56e5QrrxPDiKswj1x2_egadvmklDHDMplfV9EtXCjovoF9FIJSEtIQewOv2b3Q3x98j2NJzM-9BeIbp1l8Ih_qvwJOjq8dadSdoZkJwvb7Z9EjlWwGBCJKKqCJes2ens8DJIK8Qpb-ITTsl1xv4AFX3fFCUjA3bV1KEgS5H2Uvq0');">
<div class="absolute inset-0 bg-background-dark/60 backdrop-blur-[1px]"></div>
<!-- Simulated Route Path -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<path d="M190 600 C 190 500, 220 400, 250 350 S 180 200, 180 100 L 180 0" fill="none" stroke="#2b8cee" stroke-linecap="round" stroke-linejoin="round" stroke-width="6" style="filter: drop-shadow(0 0 8px rgba(43, 140, 238, 0.6));"></path>
<!-- Current Location Marker -->
<circle cx="210" cy="450" fill="#2b8cee" r="12" stroke="white" stroke-width="3"></circle>
<circle cx="210" cy="450" fill="#2b8cee" opacity="0.2" r="30"></circle>
</svg>
</div>
<!-- Floating Navigation Controls -->
<div class="absolute top-4 right-4 z-10 flex flex-col gap-3">
<div class="bg-surface-dark/90 backdrop-blur-md rounded-lg shadow-lg border border-[#233648] p-1 flex flex-col items-center">
<button class="p-2 text-white hover:text-primary transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<div class="w-full h-px bg-[#233648]"></div>
<button class="p-2 text-white hover:text-primary transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<button class="size-10 bg-surface-dark/90 backdrop-blur-md rounded-lg shadow-lg border border-[#233648] flex items-center justify-center text-primary hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined">near_me</span>
</button>
</div>
<!-- Next Turn Card (Overlay) -->
<div class="absolute top-4 left-4 right-16 z-10">
<div class="bg-surface-dark/95 backdrop-blur-md rounded-xl p-4 shadow-xl border border-[#233648] flex items-center gap-4 animate-in slide-in-from-top-4 fade-in duration-500">
<div class="bg-primary/20 p-3 rounded-lg text-primary">
<span class="material-symbols-outlined text-3xl">turn_right</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-text-secondary text-xs uppercase font-bold tracking-wider mb-0.5">200m</p>
<h3 class="text-white text-lg font-bold truncate leading-tight">Avenue Habib Bourguiba</h3>
</div>
</div>
</div>
<!-- Bottom Action Area -->
<div class="mt-auto z-10 p-4 pb-6 bg-gradient-to-t from-background-dark via-background-dark/90 to-transparent">
<!-- Quick Actions Grid -->
<div class="grid grid-cols-2 gap-3 mb-4">
<button class="flex items-center justify-center gap-2 h-12 bg-surface-dark hover:bg-[#233648] text-white rounded-xl font-medium border border-[#233648] transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined text-primary">call</span>
<span>Call Admin</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 bg-surface-dark hover:bg-[#233648] text-white rounded-xl font-medium border border-[#233648] transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined text-orange-400">report_problem</span>
<span>Report Issue</span>
</button>
</div>
<!-- Customer Info Card -->
<div class="bg-surface-dark rounded-xl p-4 border border-[#233648] shadow-lg">
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-3">
<div class="relative">
<img alt="Customer Profile" class="size-10 rounded-full object-cover border-2 border-primary" data-alt="Portrait of a smiling man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANS1XqrG-r3x3eftcXtQrC_obR_R-0UulFRKVp9iOs5qA4IvzRYRsxNaK0HiOZ78t31eZascej1KlNN9YFqVxvN3__67lqPKWP_zFspSXo05CginEsx48h34uVxQo4krR88g8UA10eal03oFRRx7LTO3yKGagprtICEOBdTxLEE719eOuXDfgi3NFvjxNoFLWRnpgRIy0E4RgthifQFE7cHFEmeOMg0KWStIU2v6jRHhYAwBv9k-XBC_6QEE7uU1XmyAmMHwE4-0A"/>
<div class="absolute -bottom-1 -right-1 bg-green-500 size-3 rounded-full border-2 border-surface-dark"></div>
</div>
<div>
<h4 class="text-white font-bold text-sm">Ahmed Ben Ali</h4>
<div class="flex items-center gap-1 text-xs text-text-secondary">
<span class="material-symbols-outlined text-[14px] text-yellow-400 fill-current">star</span>
<span>4.8</span>
<span class="mx-1">•</span>
<span>Cash Trip</span>
</div>
</div>
</div>
<div class="text-right">
<p class="text-primary font-bold text-lg">8.5 TND</p>
<p class="text-xs text-text-secondary">12 min</p>
</div>
</div>
<button class="w-full h-12 bg-primary hover:bg-blue-600 text-white font-bold rounded-lg shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                    Complete Ride
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="flex gap-2 border-t border-[#233648] bg-surface-dark px-4 pb-6 pt-3 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-white group" href="#">
<div class="text-white group-hover:bg-white/5 rounded-full w-12 h-8 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-white text-[10px] font-medium leading-normal tracking-[0.015em]">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-text-secondary group" href="#">
<div class="text-text-secondary group-hover:text-white group-hover:bg-white/5 rounded-full w-12 h-8 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined">attach_money</span>
</div>
<p class="text-text-secondary group-hover:text-white text-[10px] font-medium leading-normal tracking-[0.015em]">Earnings</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-text-secondary group" href="#">
<div class="text-text-secondary group-hover:text-white group-hover:bg-white/5 rounded-full w-12 h-8 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined">star</span>
</div>
<p class="text-text-secondary group-hover:text-white text-[10px] font-medium leading-normal tracking-[0.015em]">Ratings</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-text-secondary group" href="#">
<div class="text-text-secondary group-hover:text-white group-hover:bg-white/5 rounded-full w-12 h-8 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-text-secondary group-hover:text-white text-[10px] font-medium leading-normal tracking-[0.015em]">Profile</p>
</a>
</nav>
</body></html>
