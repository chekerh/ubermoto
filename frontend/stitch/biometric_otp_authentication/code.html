<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nassib - Authentification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f47b25",
                        "primary-dark": "#d6620f",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221710",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2d2018",
                        "text-primary-light": "#1c130d",
                        "text-primary-dark": "#f8f7f5",
                        "text-secondary-light": "#9c6c49",
                        "text-secondary-dark": "#bf9b80",
                        "border-light": "#e8d9ce",
                        "border-dark": "#4a3b32",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-primary-light dark:text-text-primary-dark antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto overflow-hidden shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Status Bar Placeholder (iOS Style) -->
<div class="w-full h-11 flex justify-between items-center px-6 pt-2">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px] rotate-180">battery_full</span>
</div>
</div>
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] text-center">Connexion</h2>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Content Scroll Area -->
<div class="flex-1 overflow-y-auto px-6 pb-8">
<!-- Header Section -->
<div class="flex flex-col items-center pt-6 pb-8">
<div class="mb-6 rounded-2xl bg-primary/10 p-4">
<span class="material-symbols-outlined text-4xl text-primary">two_wheeler</span>
</div>
<h1 class="text-[28px] font-bold leading-tight text-center mb-2">Bienvenue sur Nassib</h1>
<p class="text-text-secondary-light dark:text-text-secondary-dark text-center text-base">
                    Entrez vos coordonnées pour accéder à votre compte.
                </p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Phone/Email Input -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-text-primary-light dark:text-text-primary-dark ml-1">Téléphone ou Email</label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary-light dark:text-text-secondary-dark">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full rounded-xl border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark pl-11 pr-4 py-3.5 text-base outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-text-secondary-light/70 dark:placeholder:text-text-secondary-dark/70" placeholder="+216 22 123 456" type="text" value=""/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full rounded-xl bg-primary hover:bg-primary-dark text-white font-bold h-12 shadow-lg shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Continuer</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative py-4 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-light dark:border-border-dark"></div>
</div>
<span class="relative bg-background-light dark:bg-background-dark px-4 text-xs font-medium text-text-secondary-light dark:text-text-secondary-dark uppercase tracking-wider">ou utiliser</span>
</div>
<!-- Biometric Login Button -->
<button class="w-full rounded-xl border border-primary/30 bg-surface-light dark:bg-surface-dark hover:bg-primary/5 dark:hover:bg-primary/10 text-primary font-semibold h-12 transition-all flex items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform">fingerprint</span>
<span>Connexion Biométrique</span>
</button>
</form>
<!-- OTP Section (Simulated State) -->
<div class="mt-10 pt-8 border-t border-border-light dark:border-border-dark animate-fade-in">
<div class="text-center mb-6">
<h3 class="text-lg font-bold mb-2">Vérification</h3>
<p class="text-sm text-text-secondary-light dark:text-text-secondary-dark">
                        Nous avons envoyé un code à 6 chiffres au <br/>
<span class="font-semibold text-text-primary-light dark:text-text-primary-dark">+216 55 *** *89</span>
</p>
</div>
<!-- OTP Inputs -->
<div class="flex justify-between gap-2 mb-6 max-w-[320px] mx-auto">
<input class="w-10 h-12 text-center text-xl font-bold rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none" maxlength="1" placeholder="-" type="text" value="5"/>
<input class="w-10 h-12 text-center text-xl font-bold rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none" maxlength="1" placeholder="-" type="text" value="8"/>
<input class="w-10 h-12 text-center text-xl font-bold rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none" maxlength="1" placeholder="-" type="text" value="2"/>
<input autofocus="" class="w-10 h-12 text-center text-xl font-bold rounded-lg border border-primary dark:border-primary ring-1 ring-primary bg-surface-light dark:bg-surface-dark outline-none" maxlength="1" placeholder="" type="text"/>
<input class="w-10 h-12 text-center text-xl font-bold rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none" maxlength="1" placeholder="" type="text"/>
<input class="w-10 h-12 text-center text-xl font-bold rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none" maxlength="1" placeholder="" type="text"/>
</div>
<!-- Resend Timer -->
<div class="flex flex-col items-center gap-3">
<p class="text-sm font-medium text-text-secondary-light dark:text-text-secondary-dark flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">schedule</span>
                        00:45
                    </p>
<button class="text-sm font-bold text-primary hover:text-primary-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        Renvoyer le code SMS
                    </button>
</div>
</div>
</div>
<!-- Footer / Cultural Element -->
<div class="absolute bottom-0 left-0 w-full h-2 bg-gradient-to-r from-primary via-[#f4a261] to-primary"></div>
</div>
</body></html>
