<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nassib - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f47b25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221710",
                        "accent-blue": "#1c3d5a",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden">
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="text-primary flex items-center justify-center">
<img id="login-logo" src="" alt="Nassib" class="h-6 w-6 object-contain hidden" />
<span id="login-logo-fallback" class="material-symbols-outlined" style="font-size: 24px;">two_wheeler</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">Nassib</h2>
</div>
<div class="size-12"></div> 
</div>
<div class="flex flex-col flex-1 px-4 max-w-md mx-auto w-full pb-8">
<div class="text-center pt-6 pb-6">
<h1 class="text-slate-900 dark:text-slate-100 text-[32px] font-bold leading-tight mb-2">Merhba bik!</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">Log in to start your ride or delivery</p>
</div>
<div class="pb-6">
<div class="flex border-b border-slate-200 dark:border-slate-700">
<button id="login-tab-phone" class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 pb-3 pt-2 flex-1 transition-all">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Phone Number</p>
</button>
<button id="login-tab-email" data-active="1" class="flex flex-col items-center justify-center border-b-[3px] border-primary text-slate-900 dark:text-white pb-3 pt-2 flex-1 transition-all">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Email</p>
</button>
</div>
</div>
<div class="space-y-4 mb-8">
<label id="login-phone-field" class="block hidden">
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium mb-2 block">Phone Number</span>
<div class="relative flex items-center">
<input id="login-phone" class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-14 pl-4 pr-12 text-base shadow-sm" placeholder="+216 20 123 456" type="tel"/>
<div class="absolute right-4 text-slate-400 dark:text-slate-500 pointer-events-none flex items-center">
<span class="material-symbols-outlined">phone_iphone</span>
</div>
</div>
</label>
<label id="login-email-field" class="block">
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium mb-2 block">Email</span>
<div class="relative flex items-center">
<input id="login-email" class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-14 pl-4 pr-12 text-base shadow-sm" placeholder="you@example.com" type="email"/>
<div class="absolute right-4 text-slate-400 dark:text-slate-500 pointer-events-none flex items-center">
<span class="material-symbols-outlined">mail</span>
</div>
</div>
</label>
<label class="block">
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium mb-2 block">Password</span>
<div class="relative flex items-center">
<input id="login-password" class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-14 pl-4 pr-12 text-base shadow-sm" placeholder="Minimum 6 characters" type="password"/>
<div class="absolute right-4 text-slate-400 dark:text-slate-500 pointer-events-none flex items-center">
<span class="material-symbols-outlined">lock</span>
</div>
</div>
</label>
<button id="auth-login-btn" class="w-full bg-primary hover:bg-orange-600 text-white font-bold h-14 rounded-xl shadow-lg shadow-orange-500/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Continue</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<p id="login-mode-hint" class="text-xs text-slate-500 dark:text-slate-400">
                Use email or phone number with your password.
              </p>
</div>
<div class="mt-8 text-center pb-6">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Don't have an account? 
                <a id="auth-register-link" class="text-primary font-bold hover:underline" href="#">Register now</a>
</p>
<p class="text-xs text-slate-400 dark:text-slate-500 mt-2">
                Choose role during registration.
              </p>
</div>
</div>

</body></html>
